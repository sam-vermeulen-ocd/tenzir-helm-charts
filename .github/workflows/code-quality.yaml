name: Code Quality

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint and scan charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.17.3

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Set up kubeconform
        uses: bmuschko/setup-kubeconform@v1
        with:
          kubeconform-version: "0.7.0"

      - name: helm lint
        run: helm lint charts/tenzir-node

      - name: chart-testing lint
        run: ct lint --charts charts/tenzir-node --validate-maintainers=false

      - name: helm template + kubeconform
        run: |
          helm template tn charts/tenzir-node -f examples/full.yaml \
            | kubeconform -strict -summary -kubernetes-version 1.33.3 -

      - name: trivy config
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_HELM_VALUES: examples/full.yaml
        with:
          scan-type: config
          scan-ref: charts/tenzir-node
          severity: HIGH,CRITICAL
          exit-code: "1"
          hide-progress: "true"
