name: Publish tenzir-node

on:
  push:
    tags:
      - "tenzir-node/v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write   # required for cosign keyless signing via the GHA OIDC token

jobs:
  publish:
    name: Push and cosign-sign chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.17.3

      - name: Install Cosign
        # Pinned to the same SHA used by tenzir/tenzir's docker.yaml.
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io \
                --username "${{ github.actor }}" \
                --password-stdin

      - name: Extract chart version from tag
        id: meta
        run: |
          # Tag format: tenzir-node/v<chart-version>
          version="${GITHUB_REF_NAME#tenzir-node/v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Package the chart
        run: helm package charts/tenzir-node --destination .out

      - name: Push and capture digest
        id: push
        run: |
          pkg=$(ls .out/tenzir-node-*.tgz)
          helm push "$pkg" oci://ghcr.io/tenzir/charts 2>&1 | tee push.log
          digest=$(awk '/^Digest:/ {print $2; exit}' push.log)
          if [ -z "$digest" ]; then
            echo "::error::Could not capture digest from helm push output"
            exit 1
          fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Cosign keyless sign by digest
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        # Users verify with:
        #   cosign verify \
        #     --certificate-identity-regexp="https://github.com/tenzir/helm-charts/.*" \
        #     --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
        #     ghcr.io/tenzir/charts/tenzir-node:vX.Y.Z
        run: cosign sign --yes "ghcr.io/tenzir/charts/tenzir-node@${DIGEST}"

      - name: Log out of GHCR
        if: always()
        run: helm registry logout ghcr.io
