{{- with .Values.podDisruptionBudget -}}
{{- if and (hasKey . "minAvailable") (hasKey . "maxUnavailable") -}}
{{- fail "podDisruptionBudget: set only one of minAvailable or maxUnavailable" -}}
{{- end -}}
{{- if or (hasKey . "minAvailable") (hasKey . "maxUnavailable") }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "tenzir-node.fullname" $ }}
  labels:
    {{- include "tenzir-node.labels" $ | nindent 4 }}
spec:
  {{- if hasKey . "minAvailable" }}
  minAvailable: {{ .minAvailable }}
  {{- end }}
  {{- if hasKey . "maxUnavailable" }}
  maxUnavailable: {{ .maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "tenzir-node.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: node
{{- end }}
{{- end }}
