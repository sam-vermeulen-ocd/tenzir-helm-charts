{{- range $node := .Values.nodes }}
{{- $token := default dict $node.token }}
{{- if and $token.value (not $token.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tenzir-node.tokenSecretName" (dict "root" $ "node" $node) }}
  labels:
    {{- include "tenzir-node.labels" $ | nindent 4 }}
    app.kubernetes.io/component: node
    app.kubernetes.io/tenzir-node: {{ $node.name | quote }}
type: Opaque
stringData:
  {{ default "TENZIR_TOKEN" $token.key | quote }}: {{ $token.value | quote }}
{{- end }}
{{- end }}
